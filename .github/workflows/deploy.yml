name: Deploy React app to GitHub Pages

on:
  push:
    branches: ["main"]

  # 允許從 Actions 頁面手動觸發
  workflow_dispatch:

# 設定 GITHUB_TOKEN 的權限，讓它能推送到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 只允許一個 concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # dist 是 Vite 預設打出來的產物資料夾
          path: './dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
